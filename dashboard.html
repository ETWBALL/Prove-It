<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MAT102 Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { uoft: { blue: '#1E3765', darker: '#0A1526', orange: '#F2A900' } } } } }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-input { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .glass-input:focus { outline: none; border-color: #F2A900; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    </style>
</head>
<body class="bg-uoft-darker min-h-screen text-white font-sans flex overflow-hidden">
    <nav class="w-20 glass-panel border-r border-white/5 flex flex-col items-center py-6 gap-8 z-20 shadow-2xl">
        <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center p-1 shadow-lg shadow-uoft-orange/20">
            <img src="uoft.png" alt="U of T" class="w-full h-full object-contain">
        </div>
        <div class="flex flex-col gap-6 w-full items-center">
            <a href="dashboard.html" class="text-uoft-orange p-3 rounded-xl bg-white/5 transition-colors border border-uoft-orange/30" title="Home">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </a>
        </div>
        <div class="mt-auto">
            <a href="index.html" class="text-gray-500 hover:text-white p-3 transition-colors" title="Logout">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </a>
        </div>
    </nav>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto relative bg-gradient-to-br from-uoft-darker to-uoft-blue/40">
        <header class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-10 sticky top-0 z-10">
            <div class="relative w-96">
                <input type="text" placeholder="Search saved proofs..." class="glass-input w-full py-2 pl-10 pr-4 rounded-full text-sm">
                <svg class="w-4 h-4 absolute left-4 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm font-medium text-gray-300">MAT102 Student</span>
                <div class="w-8 h-8 rounded-full bg-uoft-blue border border-uoft-orange flex items-center justify-center text-xs font-bold text-uoft-orange">U</div>
            </div>
        </header>

        <div class="p-10 max-w-6xl mx-auto w-full z-10">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-bold mb-2 tracking-tight">Recent Proofs</h2>
                    <p class="text-gray-400 text-sm">Pick up where you left off.</p>
                </div>
                <a href="editor.html" class="bg-uoft-orange hover:bg-orange-500 text-uoft-darker px-6 py-2.5 rounded-xl font-bold shadow-[0_0_15px_rgba(242,169,0,0.3)] transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Document
                </a>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <a href="editor.html" class="glass-panel p-6 rounded-2xl cursor-pointer hover:-translate-y-1 hover:border-uoft-orange/50 transition-all group block">
                    <div class="w-10 h-10 rounded-lg bg-blue-500/20 text-blue-400 flex items-center justify-center mb-4 border border-blue-500/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <h3 class="font-semibold text-lg mb-1 group-hover:text-uoft-orange transition-colors">Induction: Sum of Squares</h3>
                    <p class="text-xs text-gray-400 mb-4">Last edited 2 hours ago</p>
                    <div class="flex items-center gap-2 text-xs text-green-400 bg-green-400/10 border border-green-400/20 inline-flex px-2 py-1 rounded-md">
                        <span>0 Errors Detected</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script>
        // Update profile name from local storage
        document.addEventListener("DOMContentLoaded", () => {
            const email = localStorage.getItem("utorEmail");
            if(email) document.getElementById("user-display").innerText = email.split('@')[0];
        });
    </script>
</body>
</html>
