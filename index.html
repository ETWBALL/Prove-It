<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAT102 Proof Evaluator</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 2rem auto; }
        textarea, input { width: 100%; margin-bottom: 1rem; padding: 0.5rem; font-family: monospace; }
        button { padding: 0.5rem 1rem; background: #002A5C; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        .error-card { border-left: 4px solid #d93025; padding: 1rem; background: #f8d7da; margin-top: 1rem; }
        .format-card { border-left: 4px solid #f2a900; padding: 1rem; background: #fff3cd; margin-top: 1rem; }
    </style>
</head>
<body>
    <h2>MAT102 Proof Evaluator</h2>
    
    <label>Statement to Prove:</label>
    <input type="text" id="statement" placeholder="e.g., If n is even, n^2 is even.">
    
    <label>Your Proof:</label>
    <textarea id="proof" rows="8" placeholder="Enter your proof steps here..."></textarea>
    
    <button id="verify-btn" onclick="submitProof()">Analyze Proof</button>
    <div id="results"></div>

    <script>
        /**
         * Collects UI input and sends it to the local Python Flask API.
         */
        async function submitProof() {
            const btn = document.getElementById('verify-btn');
            const resultsDiv = document.getElementById('results');
            const statement = document.getElementById('statement').value;
            const proof = document.getElementById('proof').value;

            btn.disabled = true;
            btn.innerText = "Analyzing...";
            resultsDiv.innerHTML = "";

            try {
                // Ping the local Python server
                const response = await fetch('http://localhost:5000/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ statement, proof })
                });

                const errors = await response.json();
                
                if (errors.length === 0) {
                    resultsDiv.innerHTML = "<p style='color: green; font-weight: bold;'>No major logic or format errors detected!</p>";
                } else {
                    errors.forEach(err => {
                        // Apply different styling based on error type
                        const cssClass = err.type === 'logic' ? 'error-card' : 'format-card';
                        resultsDiv.innerHTML += `
                            <div class="${cssClass}">
                                <strong>[Line ${err.line || '?'}] ${err.title}</strong>
                                <p>${err.description}</p>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                resultsDiv.innerHTML = "<p style='color: red;'>Error connecting to local server. Is app.py running?</p>";
            } finally {
                btn.disabled = false;
                btn.innerText = "Analyze Proof";
            }
        }
    </script>
</body>
</html>
