<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAT102 Logic Studio | University of Toronto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { 
                        uoft: { 
                            blue: '#1E3765',    // Official U of T Navy
                            darker: '#0A1526',  // Deep background
                            orange: '#F2A900'   // High-contrast accent orange
                        } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }
        .glass-input:focus { outline: none; border-color: #F2A900; box-shadow: 0 0 0 2px rgba(242, 169, 0, 0.3); }
        select option { background-color: #1E3765; color: white; }
    </style>
</head>
<body class="bg-gradient-to-br from-uoft-darker to-uoft-blue min-h-screen text-white font-sans overflow-hidden relative flex flex-col">
    
    <div class="absolute inset-0 z-0 opacity-30 pointer-events-none">
        <canvas id="bg-chart"></canvas>
    </div>

    <header class="absolute top-6 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full flex gap-6 items-center z-10 w-11/12 max-w-4xl justify-between">
        <div class="flex items-center gap-3">
            <img src="uoft.jpg" alt="U of T Logo" class="h-6 object-contain">
            <div class="h-4 w-px bg-white/20"></div>
            <span class="font-semibold tracking-wide text-sm text-gray-200">Department of Mathematics</span>
        </div>
        <button onclick="openLogin()" class="text-sm font-medium hover:text-uoft-orange transition-colors">Sign In</button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center text-center px-4 z-10">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6">
            behind all truths, there is a <span class="text-uoft-orange">proof</span>
        </h1>
        <p class="text-xl text-gray-300 max-w-2xl mb-10 leading-relaxed font-light">
            The local MAT102 AI evaluator. Verify your structural logic and mathematical grammar instantly, before you submit.
        </p>
        <button onclick="openLogin()" class="bg-uoft-orange hover:bg-orange-500 text-uoft-darker px-8 py-4 rounded-2xl font-bold text-lg shadow-[0_0_20px_rgba(242,169,0,0.4)] transition-all hover:-translate-y-1">
            Access Workspace
        </button>
        
        <div class="mt-12 flex items-center gap-2 glass-panel px-4 py-2 rounded-full">
            <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
            <span class="text-xs text-gray-300 font-medium">142 students active this session</span>
        </div>
    </main>

    <div id="login-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-md transition-opacity">
        <div class="glass-panel p-10 rounded-3xl w-full max-w-md relative animate-[fadeIn_0.3s_ease-out]">
            <button onclick="closeLogin()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <h2 id="welcome-header" class="text-3xl font-bold mb-2">Sign In</h2>
            <p id="welcome-subtext" class="text-gray-400 mb-8">Access your local MAT102 environment.</p>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">UTOR Email</label>
                    <input type="email" id="utor-email" placeholder="e.g., student@mail.utoronto.ca" required class="glass-input w-full p-3 rounded-xl transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Course</label>
                    <div class="relative">
                        <select id="class-select" required class="glass-input w-full p-3 rounded-xl transition-all appearance-none cursor-pointer">
                            <option value="MAT102Y5" selected>MAT102Y5 - Intro to Mathematical Proofs</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input type="password" id="utor-password" placeholder="••••••••" required class="glass-input w-full p-3 rounded-xl transition-all">
                </div>
                <button type="submit" class="w-full bg-uoft-orange hover:bg-orange-500 text-uoft-darker p-3 rounded-xl font-bold mt-6 transition-colors">
                    Launch Studio
                </button>
            </form>
        </div>
    </div>

    <script>
        // Modal Logic
        function openLogin() { document.getElementById('login-modal').classList.remove('hidden'); }
        function closeLogin() { document.getElementById('login-modal').classList.add('hidden'); }

        // Local Storage / Authentication Logic
        document.addEventListener("DOMContentLoaded", () => {
            const emailInput = document.getElementById("utor-email");
            const header = document.getElementById("welcome-header");
            const subtext = document.getElementById("welcome-subtext");
            const loginForm = document.getElementById("login-form");

            const savedEmail = localStorage.getItem("utorEmail");
            if (savedEmail) {
                emailInput.value = savedEmail;
                header.innerText = "Welcome back!";
                subtext.innerHTML = `Continuing as <strong class="text-white">${savedEmail}</strong>`;
            }

            loginForm.addEventListener("submit", (e) => {
                e.preventDefault(); 
                localStorage.setItem("utorEmail", emailInput.value);
                // Redirect to dashboard
                window.location.href = "dashboard.html";
            });

            // --- Background Chart Initialization ---
            const ctx = document.getElementById('bg-chart').getContext('2d');
            
            // Generate a fake exponential growth dataset mimicking student adoption
            const labels = Array.from({length: 30}, (_, i) => `Day ${i+1}`);
            const dataPoints = [];
            let currentUsers = 5;
            for(let i = 0; i < 30; i++) {
                dataPoints.push(currentUsers);
                // Fake growth formula (adds randomness)
                currentUsers = Math.floor(currentUsers * 1.15) + Math.floor(Math.random() * 10);
            }

            // Create gradient for the line fill
            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(242, 169, 0, 0.5)'); // U of T Orange
            gradient.addColorStop(1, 'rgba(30, 55, 101, 0)');   // Fade into Navy

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Active Proof Evaluations',
                        data: dataPoints,
                        borderColor: '#F2A900',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4 // Smooth, curved line
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 2000, easing: 'easeOutQuart' },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    scales: {
                        x: { display: false }, // Hide axes to make it look like abstract background art
                        y: { display: false, min: 0 }
                    },
                    layout: { padding: { bottom: -20 } } // Push graph slightly off the bottom edge
                }
            });
        });
    </script>
</body>
</html>
